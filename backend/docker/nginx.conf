# Nginx reverse proxy configuration.
#
# Routing:
#   /ws/*    → Uvicorn with WebSocket upgrade headers
#   /api/*   → Uvicorn HTTP
#   /health  → Uvicorn HTTP (used by load-balancer probes)
#   /docs    → Uvicorn HTTP (FastAPI Swagger UI — disabled in production)
#   /        → 404 (no static files served)
#
# This config is used by the nginx service in docker-compose.yml.
# In production, replace the upstream address with your ECS/K8s service DNS.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    sendfile   on;
    keepalive_timeout 65;

    # Upstream: the Uvicorn API container
    upstream uvicorn {
        server api:8000;
        keepalive 32;
    }

    server {
        listen      80;
        server_name _;

        # ── WebSocket endpoint ────────────────────────────────────────────────
        # Must be listed before /api/ so the more specific prefix matches first.
        location /ws/ {
            proxy_pass         http://uvicorn;
            proxy_http_version 1.1;

            # Required headers for WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for persistent WebSocket connections (2-hour sessions)
            proxy_read_timeout    7200s;
            proxy_send_timeout    7200s;
            proxy_connect_timeout 10s;

            # Disable buffering for real-time bidirectional messaging
            proxy_buffering off;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://uvicorn;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Standard HTTP timeout — most requests complete in < 30 s
            # Plan generation (Claude call) can take up to 60 s
            proxy_read_timeout    90s;
            proxy_send_timeout    30s;
            proxy_connect_timeout 10s;

            # Request size limit — video upload requests only send metadata
            # (pre-signed URL flow); actual video bytes go direct to S3
            client_max_body_size 10m;
        }

        # ── Health check (for load-balancer probes) ───────────────────────────
        location /health {
            proxy_pass         http://uvicorn;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 5s;
            access_log         off;  # suppress health-check noise from logs
        }

        # ── FastAPI docs (dev/staging only — remove in production) ────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://uvicorn;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Catch-all: reject anything else ───────────────────────────────────
        location / {
            return 404;
        }
    }
}
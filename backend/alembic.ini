# =============================================================================
# DATABASE_URL is injected at runtime by env.py (from app/core/config.py).
# The sqlalchemy.url below is a placeholder — it is overridden in env.py
# before any connection is made.  Do NOT put real credentials here.
# =============================================================================

[alembic]

# ── Migration script location ─────────────────────────────────────────────────
script_location = alembic

# ── Migration file naming ─────────────────────────────────────────────────────
# Produces filenames like:  2026_01_01_0001_initial_schema.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# ── Timezone for generated migration timestamps ───────────────────────────────
timezone = UTC

# ── Database URL placeholder (overridden in env.py) ──────────────────────────
# asyncpg is used at runtime; this is only used for offline SQL generation.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/kinesiotrack

# ── Truncate long revision IDs in output ─────────────────────────────────────
truncate_slug_length = 40

# ── Source comparison options ─────────────────────────────────────────────────
# These mirror the settings in env.py's context.configure() calls so that
# autogenerate picks up column type changes and server default changes.
# (Alembic reads these from the ini only for offline mode; online mode uses
#  the values passed directly to context.configure().)

# ── Output encoding ───────────────────────────────────────────────────────────
output_encoding = utf-8


# =============================================================================
# Logging configuration
# Using Python's standard logging.config.fileConfig format.
# =============================================================================

[loggers]
keys = root, sqlalchemy, alembic, aiohttp

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
# Set to INFO to log all SQL statements Alembic emits during migrations.
# Set to WARNING in production to suppress verbose SQL output.
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# INFO shows revision stamps and progress; DEBUG shows full SQL.
level = INFO
handlers =
qualname = alembic

[logger_aiohttp]
level = WARNING
handlers =
qualname = aiohttp

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S